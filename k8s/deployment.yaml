# k8s/deployment.yaml
apiVersion: v1
kind:ConfigMap
metadata:
  name: trading-system-config
data:
  KAFKA_BROKER_ADDR: my-kafka:9092
  TRADES_TOPUC: trades
  EXECUTED_TRADES_TOPIC: executed-trades
  SNAPSHOT_TOPIC: orderbook-snapshots
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afe-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: afe
  template:
    metadata:
      labels:
        app: afe
    spec:
      containers:
        - name: afe
          image: ghcr.io/irio-org/trading-system/afe:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKER_ADDR
              value: "my-kafka:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/irio-org/trading-system/worker:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKER_ADDR
              value: "my-kafka:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executed-consumer-deployment
  labels:
    app: executed-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: executed-consumer
  template:
    metadata:
      labels:
        app: executed-consumer
    spec:
      containers:
        - name: executed-consumer
          image: ghcr.io/irio-org/trading-system/executed-consumer:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: trading-system-config
          env:
            - name: CONSUMER_GROUP_ID
              value: executed-consumer